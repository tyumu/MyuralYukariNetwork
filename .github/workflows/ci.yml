name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-backend/go.mod
      - name: Run tests
        run: go test ./...

  python-sidecar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run sidecar checks
        run: make test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri_app/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
